# CobraBridge — local orchestration.
# Phase 1 (legacy-core), Phase 2 (bridge), and Phase 3a (gateway) run today.
# The gateway is the only service with a published port: everything else is
# reachable only on the internal compose network. Later phases are
# scaffolded and commented until their services exist, so
# `docker compose up` always works.

services:
  legacy-core:
    build: ./legacy-core
    image: cobrabridge-legacy
    container_name: cobrabridge-legacy
    volumes:
      # expose the account master so the bridge can read it
      - legacy-data:/legacy/data

  # --- Phase 2: the anti-corruption layer ---
  bridge:
    build: ./src/CobraBridge.Bridge
    image: cobrabridge-bridge
    container_name: cobrabridge-bridge
    environment:
      - Legacy__AccountsFile=/legacy/data/ACCOUNTS.DAT
    volumes:
      - legacy-data:/legacy/data:ro
    # No published port: internal-only, reached by the gateway via the
    # "bridge" service name on the compose network.
    depends_on:
      - legacy-core

  # --- Phase 3a: API gateway (YARP) — the single public entry point ---
  gateway:
    build: ./src/CobraBridge.Gateway
    image: cobrabridge-gateway
    container_name: cobrabridge-gateway
    environment:
      - ReverseProxy__Clusters__bridge__Destinations__bridge1__Address=http://bridge:8080
    ports:
      # Host 8080 is taken by an unrelated local container on this machine;
      # the gateway still listens on 8080 inside its own container.
      - "8090:8080"
    depends_on:
      - bridge

  # --- Phase 3b/c/d: microservices behind the gateway ---
  # accounts-svc:   { }
  # transactions-svc: { }
  # customers-svc:  { }

  # --- Phase 4: messaging + dashboard ---
  # rabbitmq:       { image: rabbitmq:3-management }
  # dashboard-bff:  { } # SignalR hub
  # dashboard-ui:   { } # React SPA

volumes:
  legacy-data:
