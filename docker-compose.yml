# CobraBridge — local orchestration.
# Phase 1 (legacy-core) and Phase 2 (bridge) run today. Later phases are
# scaffolded and commented until their services exist, so
# `docker compose up` always works.

services:
  legacy-core:
    build: ./legacy-core
    image: cobrabridge-legacy
    container_name: cobrabridge-legacy
    volumes:
      # expose the account master so the bridge can read it
      - legacy-data:/legacy/data

  # --- Phase 2: the anti-corruption layer ---
  bridge:
    build: ./src/CobraBridge.Bridge
    image: cobrabridge-bridge
    container_name: cobrabridge-bridge
    environment:
      - Legacy__AccountsFile=/legacy/data/ACCOUNTS.DAT
    volumes:
      - legacy-data:/legacy/data:ro
    ports:
      - "5080:8080"
    depends_on:
      - legacy-core

  # --- Phase 3: gateway + microservices ---
  # gateway:        { } # YARP
  # accounts-svc:   { }
  # transactions-svc: { }
  # customers-svc:  { }

  # --- Phase 4: messaging + dashboard ---
  # rabbitmq:       { image: rabbitmq:3-management }
  # dashboard-bff:  { } # SignalR hub
  # dashboard-ui:   { } # React SPA

volumes:
  legacy-data:
